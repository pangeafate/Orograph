server {
    listen 80;
    listen [::]:80;
    server_name orograph.lakestrom.com;

    root /var/www/orograph.lakestrom.com/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.svg {
        expires 7d;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;
}
